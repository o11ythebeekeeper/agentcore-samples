# AgentCore Configuration for Property Search Agent
# This file configures the Property Search Agent for deployment to Bedrock AgentCore Runtime

# Agent metadata
name: property_search_agent
description: "Searches for real estate properties based on location, price, type, and amenities"
version: "1.0.0"

# Runtime configuration
runtime:
  # Python runtime version
  python_version: "3.11"
  
  # Entrypoint file (relative to this config file)
  entrypoint: "agent_agentcore.py"
  
  # Handler - for FastAPI apps, this is the app instance
  handler: "app"
  
  # Dependencies file
  requirements: "requirements.txt"

# Environment variables
environment:
  # AWS Configuration
  AWS_REGION: "us-east-1"
  
  # Logging configuration
  LOG_LEVEL: "INFO"
  
  # Model configuration
  MODEL_ID: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
  
  # Agent configuration
  AGENT_NAME: "Property Search Agent"
  AGENT_HOST: "0.0.0.0"
  AGENT_PORT: "9000"
  
  # AgentCore Runtime URL (will be set by runtime)
  AGENTCORE_RUNTIME_URL: "http://127.0.0.1:9000/"

# Resource configuration
resources:
  # Memory allocation in MB
  memory: 512
  
  # Timeout in seconds
  timeout: 300
  
  # Ephemeral storage in MB
  ephemeral_storage: 512

# Network configuration
network:
  # Port for the service
  port: 9000

# AgentCore-specific settings
agentcore:
  # Enable AgentCore Memory for conversation persistence
  memory_enabled: true
  
  # Enable AgentCore Observability
  observability_enabled: true
  
  # Enable streaming responses
  streaming_enabled: true

# Tags for organization and cost tracking
tags:
  Environment: "development"
  Agent: "property-search"
  Framework: "strands"
  Protocol: "a2a"
  Domain: "real-estate"
